name: 'Publish Multiplatform Release'

on:
  push:
    branches:
      - main

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      new_release: ${{ steps.check.outputs.new_release }}
      version: ${{ steps.check.outputs.version }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Get Version from package.json
        id: check
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "App version: $VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          
          # Fetch remote tags to check if this tag exists
          git fetch --tags
          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "Tag v$VERSION already exists. Skipping release build."
            echo "new_release=false" >> $GITHUB_OUTPUT
          else
            echo "Tag v$VERSION does not exist. Creating tag and triggering release."
            echo "new_release=true" >> $GITHUB_OUTPUT
            
            # Create and push tag
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag "v$VERSION"
            git push origin "v$VERSION"
          fi

  build-release:
    needs: check-version
    if: needs.check-version.outputs.new_release == 'true'
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, ubuntu-22.04, windows-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev

      - name: Install Node packages
        run: npm ci

      - name: Build and Publish Tauri App
        uses: tauri-apps/tauri-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v${{ needs.check-version.outputs.version }}
          releaseName: 'NoteX v${{ needs.check-version.outputs.version }}'
          releaseBody: 'Automated release for NoteX v${{ needs.check-version.outputs.version }}. See files below.'
          releaseDraft: false
          prerelease: false
